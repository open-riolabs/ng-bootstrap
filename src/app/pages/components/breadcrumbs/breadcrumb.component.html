<docs-page
  title="Breadcrumb"
  lead="Indicate the current page's location within a navigational hierarchy with the rlb-breadcrumb component.">

  <docs-example
    heading="Basic"
    description="Pass an array of BreadcrumbItem objects via the items input. The last item is rendered as plain text (active); all earlier items become router links."
    [code]="basicExample">
    <rlb-breadcrumb
      [items]="[
        { id: '1', label: 'Home', link: '/home' },
        { id: '2', label: 'Library', link: '/library' },
        { id: '3', label: 'Data' }
      ]">
    </rlb-breadcrumb>
  </docs-example>

  <docs-example
    heading="Custom divider"
    description="Use the divider input to override the default '>' separator with any character or string."
    [code]="dividerExample">
    <rlb-breadcrumb
      divider="-"
      [items]="[
        { id: '1', label: 'Home', link: '/home' },
        { id: '2', label: 'Library', link: '/library' },
        { id: '3', label: 'Data' }
      ]">
    </rlb-breadcrumb>
  </docs-example>

  <docs-example
    heading="Custom CSS classes"
    description="Use cssClasses to apply additional Bootstrap utility classes (or any custom class) directly to the breadcrumb list."
    [code]="cssClassesExample">
    <rlb-breadcrumb
      cssClasses="fs-5"
      [items]="[
        { id: '1', label: 'Home', link: '/home' },
        { id: '2', label: 'Styled' }
      ]">
    </rlb-breadcrumb>
  </docs-example>

  <docs-api selector="rlb-breadcrumb" [rows]="api" />
</docs-page>
