<docs-page
  title="List"
  lead="Use rlb-list and rlb-list-item to display a series of content items with optional numbered, flush, horizontal, active and disabled states.">

  <docs-example
    heading="Basic list"
    description="Wrap rlb-list-item elements inside rlb-list to produce a standard Bootstrap list group."
    [code]="sampleExample">
    <rlb-list>
      <rlb-list-item>Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Disabled list"
    description="Set disabled on rlb-list to disable every item in the group at once."
    [code]="disabledListExample">
    <rlb-list [disabled]="true">
      <rlb-list-item>Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Numbered"
    description="Add numbered to prefix each item with an automatically incremented counter."
    [code]="numberedExample">
    <rlb-list [numbered]="true">
      <rlb-list-item>Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Flush"
    description="Use flush to remove the outer border and rounded corners so the list renders edge-to-edge inside a parent container."
    [code]="flushExample">
    <rlb-list [flush]="true">
      <rlb-list-item>Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Horizontal"
    description="Set horizontal to lay out list items in a row instead of stacking them vertically."
    [code]="horizontalExample">
    <rlb-list [horizontal]="true">
      <rlb-list-item>Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Active item"
    description="Set active on an individual rlb-list-item to highlight it as the currently selected entry."
    [code]="activeItemExample">
    <rlb-list>
      <rlb-list-item [active]="true">Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Disabled item"
    description="Set disabled on an individual rlb-list-item to mute a single entry without affecting the rest of the list."
    [code]="disabledItemExample">
    <rlb-list>
      <rlb-list-item [disabled]="true">Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Action item"
    description="Set action to add hover and focus styles, making the item behave as an interactive element."
    [code]="actionItemExample">
    <rlb-list>
      <rlb-list-item [action]="true">Pippo</rlb-list-item>
      <rlb-list-item>Pluto</rlb-list-item>
      <rlb-list-item>Paperino</rlb-list-item>
    </rlb-list>
  </docs-example>

  <docs-example
    heading="Image item"
    description="Use rlb-list-item-image to display a rich list item with an avatar or icon, a username, detail lines, and an optional counter badge."
    [code]="imageItemExample">
    <rlb-list>
      <rlb-list-item-image
        username="Pippo"
        line-1="pippo@example.com"
        avatar="https://i.pravatar.cc/50?img=1"
        [counter]="3"
        counter-color="primary"
        [counter-pill]="true">
      </rlb-list-item-image>
      <rlb-list-item-image
        username="Pluto"
        line-1="pluto@example.com"
        avatar="https://i.pravatar.cc/50?img=2">
      </rlb-list-item-image>
      <rlb-list-item-image
        username="Paperino"
        line-1="paperino@example.com"
        icon="bi bi-person-circle">
      </rlb-list-item-image>
    </rlb-list>
  </docs-example>

  <docs-api selector="rlb-list" [rows]="listApi" />
  <docs-api selector="rlb-list-item" [rows]="listItemApi" />
  <docs-api selector="rlb-list-item-image" [rows]="listItemImageApi" />

</docs-page>
