<docs-page
  title="Toasts"
  lead="Toasts are lightweight, non-intrusive notifications that appear temporarily to give the user quick feedback without interrupting their current workflow. Use ToastService to open them programmatically into any rlb-toast-container placed in your layout.">

  <docs-example
    heading="Basic usage"
    description="Place an rlb-toast-container somewhere in your layout (typically fixed to a corner) and call ToastService.openToast() with a matching container id, a registered toast component name, and the toast data."
    [code]="basicExample">
    <rlb-toast-container id="toast-c-1" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11" />
    <button rlb-button (click)="openToast()">Open Toast</button>
  </docs-example>

  <docs-example
    heading="Registering toast components"
    description="Each named toast is a standalone Angular component that implements IToast. Register it in your application providers via ToastRegistryOptions so the service can look it up by name."
    [code]="registrationExample"
    language="typescript">
  </docs-example>

  <docs-example
    heading="Creating a toast component"
    description="A toast component uses hostDirectives to attach ToastDirective, which manages the Bootstrap toast lifecycle. Implement IToast and expose a data signal to access the title, subtitle and content passed by the caller."
    [code]="toastComponentExample"
    language="typescript">
  </docs-example>

  <docs-api selector="rlb-toast-container" [rows]="containerApi" />

  <docs-api heading="ToastService" [rows]="serviceApi" />

  <docs-api heading="ToastDirective" selector="[rlb-toast]" [rows]="directiveApi" />

</docs-page>
