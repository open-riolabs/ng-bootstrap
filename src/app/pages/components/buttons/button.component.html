<docs-page
  title="Buttons"
  lead="Use the rlb-button directive for actions in forms, dialogs and more, with support for multiple colors, sizes and states.">

  <docs-example
    heading="Base directive"
    description="Apply the rlb-button directive to a native button. Without any extra configuration it renders a primary button."
    [code]="baseDirectiveExample">
    <button rlb-button>Primary</button>
  </docs-example>

  <docs-example
    heading="Variants"
    description="Each contextual color maps to a Bootstrap button variant; use isLink to render a link-styled button."
    [code]="variantsExample">
    <div class="d-flex gap-2 flex-wrap">
      <button rlb-button color="primary">Primary</button>
      <button rlb-button color="secondary">Secondary</button>
      <button rlb-button color="success">Success</button>
      <button rlb-button color="danger">Danger</button>
      <button rlb-button color="warning">Warning</button>
      <button rlb-button color="info">Info</button>
      <button rlb-button color="light">Light</button>
      <button rlb-button color="dark">Dark</button>
      <button rlb-button isLink>Link</button>
    </div>
  </docs-example>

  <docs-example
    heading="Button types"
    description="The directive works on <button>, <a> and <input> elements. Add role=&quot;button&quot; on anchors that trigger in-page actions."
    [code]="typesExample">
    <div class="d-flex gap-2 flex-wrap">
      <a rlb-button href="#" role="button">Link</a>
      <button rlb-button type="button">Button</button>
      <input class="btn btn-primary" type="button" value="Input">
      <button rlb-button type="submit">Submit</button>
      <button rlb-button type="reset">Reset</button>
    </div>
  </docs-example>

  <docs-example
    heading="Outline buttons"
    description="Add the outline attribute to keep only the border and text color, removing the solid background."
    [code]="outlineExample">
    <div class="d-flex gap-2 flex-wrap">
      <button rlb-button outline color="primary">Primary</button>
      <button rlb-button outline color="secondary">Secondary</button>
      <button rlb-button outline color="success">Success</button>
      <button rlb-button outline color="danger">Danger</button>
    </div>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size attribute with sm, md (default) or lg."
    [code]="sizesExample">
    <div class="d-flex gap-2 flex-wrap align-items-center">
      <button rlb-button color="primary" size="sm">Small Button</button>
      <button rlb-button color="secondary" size="md">Normal Button</button>
      <button rlb-button color="info" size="lg">Large Button</button>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Add the disabled boolean attribute to make a button inactive; pointer events are blocked."
    [code]="disableExample">
    <div class="d-flex gap-2 flex-wrap">
      <button rlb-button color="primary" disabled>Primary button</button>
      <button rlb-button color="secondary" disabled>Button</button>
      <button rlb-button color="primary" outline disabled>Primary button</button>
    </div>
  </docs-example>

  <docs-api selector="button[rlb-button], a[rlb-button]" [rows]="api" />
</docs-page>
