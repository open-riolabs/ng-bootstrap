<docs-page
  title="Pagination"
  lead="Use rlb-pagination and rlb-pagination-item to build page navigation controls with support for alignment, sizes, active and disabled states.">

  <docs-example
    heading="Alignment"
    description="Use the alignment input to position the pagination list. Supported values are start (default), center, and end."
    [code]="alignmentExample">
    <rlb-pagination [alignment]="'center'">
      <rlb-pagination-item isIcon>
        <span>&laquo;</span>
      </rlb-pagination-item>
      <rlb-pagination-item isIcon>1</rlb-pagination-item>
      <rlb-pagination-item isIcon>2</rlb-pagination-item>
      <rlb-pagination-item isIcon>3</rlb-pagination-item>
      <rlb-pagination-item isIcon>4</rlb-pagination-item>
      <rlb-pagination-item isIcon>
        <span>&raquo;</span>
      </rlb-pagination-item>
    </rlb-pagination>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Control the visual size of the pagination with the size input. Use sm for small, md for the default, or lg for large."
    [code]="sizesExample">
    <div class="d-flex flex-column gap-3">
      <rlb-pagination [size]="'sm'">
        <rlb-pagination-item isIcon>
          <span>&laquo;</span>
        </rlb-pagination-item>
        <rlb-pagination-item isIcon>1</rlb-pagination-item>
        <rlb-pagination-item isIcon>2</rlb-pagination-item>
        <rlb-pagination-item isIcon>3</rlb-pagination-item>
        <rlb-pagination-item isIcon>4</rlb-pagination-item>
        <rlb-pagination-item isIcon>
          <span>&raquo;</span>
        </rlb-pagination-item>
      </rlb-pagination>
      <rlb-pagination [size]="'md'">
        <rlb-pagination-item isIcon>
          <span>&laquo;</span>
        </rlb-pagination-item>
        <rlb-pagination-item isIcon>1</rlb-pagination-item>
        <rlb-pagination-item isIcon>2</rlb-pagination-item>
        <rlb-pagination-item isIcon>3</rlb-pagination-item>
        <rlb-pagination-item isIcon>4</rlb-pagination-item>
        <rlb-pagination-item isIcon>
          <span>&raquo;</span>
        </rlb-pagination-item>
      </rlb-pagination>
      <rlb-pagination [size]="'lg'">
        <rlb-pagination-item isIcon>
          <span>&laquo;</span>
        </rlb-pagination-item>
        <rlb-pagination-item isIcon>1</rlb-pagination-item>
        <rlb-pagination-item isIcon>2</rlb-pagination-item>
        <rlb-pagination-item isIcon>3</rlb-pagination-item>
        <rlb-pagination-item isIcon>4</rlb-pagination-item>
        <rlb-pagination-item isIcon>
          <span>&raquo;</span>
        </rlb-pagination-item>
      </rlb-pagination>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled item"
    description="Add [disabled]=&quot;true&quot; to a pagination item to prevent interaction. The item becomes visually muted and keyboard/click events are blocked."
    [code]="disabledExample">
    <rlb-pagination>
      <rlb-pagination-item isIcon [disabled]="true">1</rlb-pagination-item>
    </rlb-pagination>
  </docs-example>

  <docs-example
    heading="Active item"
    description="Add [active]=&quot;true&quot; to highlight the current page. The component also sets aria-current=&quot;page&quot; for accessibility."
    [code]="activeExample">
    <rlb-pagination>
      <rlb-pagination-item isIcon [active]="true">1</rlb-pagination-item>
    </rlb-pagination>
  </docs-example>

  <docs-example
    heading="Page selection with itemClick"
    description="Listen to the itemClick output to drive page state. The event is not emitted for disabled items."
    [code]="itemClickExample">
    <div>
      <p class="mb-2">Selected page: <strong>{{ selectedPage() }}</strong></p>
      <rlb-pagination [alignment]="'center'">
        @for (p of [1, 2, 3, 4, 5]; track p) {
          <rlb-pagination-item
            isIcon
            [active]="p === selectedPage()"
            (itemClick)="selectedPage.set(p)">
            {{ p }}
          </rlb-pagination-item>
        }
      </rlb-pagination>
    </div>
  </docs-example>

  <docs-api selector="rlb-pagination" [rows]="paginationApi" />

  <docs-api heading="Pagination Item API" selector="rlb-pagination-item" [rows]="paginationItemApi" />

</docs-page>
