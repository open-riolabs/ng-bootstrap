<docs-page
  title="Components"
  lead="Browse the full set of @open-rlb/ng-bootstrap components, grouped by purpose. Pick one to see live examples and its complete API.">

  @for (group of groups; track group.title) {
    <h2 class="h4 mt-5 mb-3">{{ group.title }}</h2>
    <div class="row g-3">
      @for (item of group.items; track item.link) {
        <div class="col-sm-6 col-lg-4">
          <a [routerLink]="item.link" class="card h-100 text-reset text-decoration-none shadow-sm rlb-comp-card">
            <div class="card-body d-flex gap-3 align-items-start">
              <i class="bi {{ item.icon }} fs-4 text-primary"></i>
              <div>
                <h3 class="h6 mb-1">{{ item.name }}</h3>
                <p class="card-text small text-body-secondary mb-0">{{ item.desc }}</p>
              </div>
            </div>
          </a>
        </div>
      }
    </div>
  }

</docs-page>
