<docs-page
  title="Loaders"
  lead="Visual indicators for in-progress operations. Use rlb-progress for determinate or indeterminate progress bars, and rlb-spinner for compact loading spinners.">

  <!-- ─────────────────────────────────────────────────────────────
       Progress
  ───────────────────────────────────────────────────────────────── -->

  <docs-example
    heading="Min, Max and Value"
    description="Set min, max, and value to control how much of the bar is filled. The displayed percentage is computed automatically."
    [code]="mmvExample">
    <rlb-progress [min]="0" [max]="100" [value]="50"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Height"
    description="Use the height input to set an explicit bar height in pixels."
    [code]="heightExample">
    <rlb-progress [height]="3"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Animated"
    description="Add animated to make the stripes move. The striped pattern is applied automatically when animated is set."
    [code]="animatedExample">
    <rlb-progress [animated]="true" [value]="50"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Striped"
    description="Add a static stripe overlay to the progress bar fill."
    [code]="strippedExample">
    <rlb-progress [striped]="true" [value]="50"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Infinite"
    description="Use infinite for indeterminate operations where the total duration is unknown. Combine with color to style the animated fill."
    [code]="infiniteExample">
    <rlb-progress [infinite]="true" color="danger"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Show value"
    description="Set showValue to display the computed percentage as text inside the bar."
    [code]="showValueExample">
    <rlb-progress [showValue]="true" [value]="50"></rlb-progress>
  </docs-example>

  <docs-example
    heading="Colors"
    description="Use the color input to apply any Bootstrap contextual color to the progress fill."
    [code]="progressColorExample">
    <div class="d-flex flex-column gap-2">
      <rlb-progress [value]="75" color="success"></rlb-progress>
      <rlb-progress [value]="50" color="warning"></rlb-progress>
      <rlb-progress [value]="25" color="danger"></rlb-progress>
    </div>
  </docs-example>

  <docs-api selector="rlb-progress" [rows]="progressApi" />

  <!-- ─────────────────────────────────────────────────────────────
       Spinner
  ───────────────────────────────────────────────────────────────── -->

  <docs-example
    heading="Spinner styles"
    description="Choose between the border (spinning ring) and grow (pulsing dot) animation styles."
    [code]="spinnerStyleExample">
    <div class="d-flex gap-3 align-items-center">
      <rlb-spinner [style]="'border'"></rlb-spinner>
      <rlb-spinner [style]="'grow'"></rlb-spinner>
    </div>
  </docs-example>

  <docs-example
    heading="Colors"
    description="Apply any Bootstrap contextual color to the spinner with the color input."
    [code]="spinnerColorExample">
    <div class="d-flex gap-3 flex-wrap align-items-center">
      <rlb-spinner [color]="'primary'"></rlb-spinner>
      <rlb-spinner [color]="'secondary'"></rlb-spinner>
      <rlb-spinner [color]="'success'"></rlb-spinner>
      <rlb-spinner [color]="'danger'"></rlb-spinner>
      <rlb-spinner [color]="'warning'"></rlb-spinner>
      <rlb-spinner [color]="'info'"></rlb-spinner>
      <rlb-spinner [color]="'light'"></rlb-spinner>
      <rlb-spinner [color]="'dark'"></rlb-spinner>
    </div>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Three sizes are available: sm, md (default), and lg."
    [code]="spinnerSizeExample">
    <div class="d-flex gap-3 align-items-center">
      <rlb-spinner [size]="'sm'"></rlb-spinner>
      <rlb-spinner [size]="'md'"></rlb-spinner>
      <rlb-spinner [size]="'lg'"></rlb-spinner>
    </div>
  </docs-example>

  <docs-api selector="rlb-spinner" [rows]="spinnerApi" />

</docs-page>
