<docs-page
  title="Navbar"
  lead="A responsive navigation header with built-in support for branding, navigation links, dropdowns, forms, and sidebar toggling.">

  <docs-example
    heading="Basic navbar"
    description="Combine rlb-navbar with rlb-navbar-brand and rlb-navbar-items to create a standard navigation bar. Set expand to control the breakpoint at which the navbar collapses."
    [code]="basicExample">
    <rlb-navbar color="primary" [dark]="true" expand="lg" [showSideBarToggler]="false">
      <a rlb-navbar-brand href="#">My App</a>
      <rlb-navbar-items>
        <rlb-navbar-item router-link="/home">Home</rlb-navbar-item>
        <rlb-navbar-item router-link="/about">About</rlb-navbar-item>
      </rlb-navbar-items>
    </rlb-navbar>
  </docs-example>

  <docs-example
    heading="Navbar text"
    description="Use rlb-navbar-text to place inline text inside the collapsible section of the navbar, useful for showing the signed-in user or a status label."
    [code]="textExample">
    <rlb-navbar color="secondary" [dark]="true" expand="lg" [showSideBarToggler]="false">
      <a rlb-navbar-brand href="#">Brand</a>
      <rlb-navbar-text>Signed in as Admin</rlb-navbar-text>
    </rlb-navbar>
  </docs-example>

  <docs-example
    heading="Dropdown item"
    description="Use rlb-navbar-dropdown-item with the dropdown attribute to create a Bootstrap-powered dropdown inside the navbar. Enable the collapse toggler with enable-dropdown-toggler for mobile support."
    [code]="dropdownExample">
    <rlb-navbar color="dark" [dark]="true" expand="lg" [enable-dropdown-toggler]="true" [showSideBarToggler]="false">
      <a rlb-navbar-brand href="#">Brand</a>
      <rlb-navbar-items>
        <rlb-navbar-item router-link="/home">Home</rlb-navbar-item>
        <rlb-navbar-dropdown-item [dropdown]="true">
          Dropdown
          <rlb-dropdown-container>
            <li rlb-dropdown-item>Action</li>
            <li rlb-dropdown-item>Another action</li>
          </rlb-dropdown-container>
        </rlb-navbar-dropdown-item>
      </rlb-navbar-items>
    </rlb-navbar>
  </docs-example>

  <docs-example
    heading="Navbar form"
    description="Place a rlb-navbar-form inside the navbar to add an inline search or filter form. It aligns to the right on large screens."
    [code]="formExample">
    <rlb-navbar color="light" [dark]="false" expand="lg" [showSideBarToggler]="false">
      <a rlb-navbar-brand href="#">Brand</a>
      <rlb-navbar-form>
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button rlb-button color="primary" type="submit">Search</button>
      </rlb-navbar-form>
    </rlb-navbar>
  </docs-example>

  <docs-example
    heading="Separator"
    description="Use rlb-navbar-separator inside rlb-navbar-items to visually divide groups of nav items."
    [code]="separatorExample">
    <rlb-navbar color="primary" [dark]="true" expand="lg" [showSideBarToggler]="false">
      <a rlb-navbar-brand href="#">Brand</a>
      <rlb-navbar-items>
        <rlb-navbar-item router-link="/home">Home</rlb-navbar-item>
        <rlb-navbar-separator />
        <rlb-navbar-item router-link="/settings">Settings</rlb-navbar-item>
      </rlb-navbar-items>
    </rlb-navbar>
  </docs-example>

  <docs-api selector="rlb-navbar" [rows]="navbarApi" />
  <docs-api heading="API — rlb-navbar-items" selector="rlb-navbar-items" [rows]="navbarItemsApi" />
  <docs-api heading="API — rlb-navbar-item" selector="rlb-navbar-item" [rows]="navbarItemApi" />
  <docs-api heading="API — rlb-navbar-dropdown-item" selector="rlb-navbar-dropdown-item" [rows]="navbarDropdownItemApi" />
  <docs-api heading="API — rlb-navbar-form" selector="rlb-navbar-form" [rows]="navbarFormApi" />
  <docs-api heading="API — rlb-navbar-brand" selector="[rlb-navbar-brand]" [rows]="navbarBrandApi" />
  <docs-api heading="API — rlb-navbar-separator" selector="rlb-navbar-separator" [rows]="navbarSeparatorApi" />
</docs-page>
