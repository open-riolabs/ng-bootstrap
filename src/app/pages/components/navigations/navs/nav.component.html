<docs-page
  title="Nav"
  lead="A flexible navigation component built on Bootstrap's nav utilities, supporting tabs, pills, underline, fill, justified, and vertical layouts.">

  <docs-example
    heading="Basic nav"
    description="Use rlb-nav with rlb-nav-item children to render a plain navigation. Add the disabled boolean attribute to prevent interaction with a specific item."
    [code]="basicExample">
    <rlb-nav>
      <rlb-nav-item href="#">Home</rlb-nav-item>
      <rlb-nav-item href="#">About</rlb-nav-item>
      <rlb-nav-item href="#">Services</rlb-nav-item>
      <rlb-nav-item href="#" disabled>Contact</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Tabs"
    description="Set view=&quot;tabs&quot; to apply the Bootstrap tabbed appearance. Use the active attribute on a nav item to indicate the current page."
    [code]="tabsExample">
    <rlb-nav view="tabs">
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
      <rlb-nav-item href="#" disabled>Settings</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Pills"
    description="Add the pills boolean attribute (or set view=&quot;pills&quot;) to render items as pill-shaped links. The pills shorthand takes precedence over view."
    [code]="pillsExample">
    <rlb-nav pills>
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Underline"
    description="Add the underline boolean attribute (or set view=&quot;underline&quot;) to apply Bootstrap's nav-underline style."
    [code]="underlineExample">
    <rlb-nav underline>
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Fill"
    description="Set fill=&quot;true&quot; (or the fill boolean) to make nav items grow and fill the available horizontal space proportionally."
    [code]="fillExample">
    <rlb-nav view="tabs" fill="true">
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Justified"
    description="Set fill=&quot;justified&quot; to force all nav items to equal width, fully justifying the nav across its container."
    [code]="justifiedExample">
    <rlb-nav view="tabs" fill="justified">
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Vertical"
    description="Add the vertical boolean attribute to stack nav items in a column using Bootstrap's flex-column utility."
    [code]="verticalExample">
    <rlb-nav pills vertical>
      <rlb-nav-item href="#" active>Home</rlb-nav-item>
      <rlb-nav-item href="#">Profile</rlb-nav-item>
      <rlb-nav-item href="#">Messages</rlb-nav-item>
    </rlb-nav>
  </docs-example>

  <docs-example
    heading="Horizontal alignment"
    description="Use horizontal-alignment=&quot;center&quot; or &quot;end&quot; to align nav items to the centre or right of the container."
    [code]="alignmentExample">
    <div class="d-flex flex-column gap-3">
      <rlb-nav horizontal-alignment="center">
        <rlb-nav-item href="#" active>Home</rlb-nav-item>
        <rlb-nav-item href="#">Profile</rlb-nav-item>
        <rlb-nav-item href="#">Messages</rlb-nav-item>
      </rlb-nav>
      <rlb-nav horizontal-alignment="end">
        <rlb-nav-item href="#" active>Home</rlb-nav-item>
        <rlb-nav-item href="#">Profile</rlb-nav-item>
        <rlb-nav-item href="#">Messages</rlb-nav-item>
      </rlb-nav>
    </div>
  </docs-example>

  <docs-api selector="rlb-nav" [rows]="navApi" />

  <docs-api selector="rlb-nav-item" heading="API — rlb-nav-item" [rows]="navItemApi" />

</docs-page>
