<docs-page
  title="Collapse"
  lead="Use rlb-collapse to toggle the visibility of content with a smooth animation. A trigger button using the toggle directive wires everything together with no extra code.">

  <docs-example
    heading="Basic collapse"
    description="Apply the toggle directive with toggle=&quot;collapse&quot; and toggle-target pointing to the rlb-collapse id. The panel animates open and closed on each click."
    [code]="basicExample">
    <button rlb-button toggle="collapse" toggle-target="collapse-basic">Toggle</button>
    <rlb-collapse id="collapse-basic">
      <div class="mt-2 p-3 border rounded">
        This is the collapsible content. It can be any HTML you like.
      </div>
    </rlb-collapse>
  </docs-example>

  <docs-example
    heading="Horizontal orientation"
    description="Set orientation=&quot;horizontal&quot; to animate the panel width instead of height."
    [code]="horizontalExample">
    <button rlb-button toggle="collapse" toggle-target="collapse-horizontal">Toggle horizontal</button>
    <rlb-collapse id="collapse-horizontal" orientation="horizontal">
      <div class="p-3 border rounded" style="width: 14rem;">
        This panel collapses horizontally.
      </div>
    </rlb-collapse>
  </docs-example>

  <docs-example
    heading="Status change events"
    description="Bind (statusChange) to react to Bootstrap lifecycle events: show, shown, hide, hidden, and hidePrevented."
    [code]="statusChangeExample">
    <p class="mb-2">Events received: {{ message }}</p>
    <button rlb-button toggle="collapse" toggle-target="collapse-status">Toggle</button>
    <rlb-collapse id="collapse-status" (statusChange)="onStatusChange($event)">
      <div class="mt-2 p-3 border rounded">
        Toggle me to see statusChange events fire.
      </div>
    </rlb-collapse>
  </docs-example>

  <docs-api selector="rlb-collapse" [rows]="collapseApi" />

  <docs-api heading="Toggle directive" selector="button[toggle], a[toggle]" [rows]="toggleDirectiveApi" />

</docs-page>
