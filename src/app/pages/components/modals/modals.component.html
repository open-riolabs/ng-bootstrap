<docs-page
  title="Modals"
  lead="Use the modal system to open dialog windows above the page — programmatically via ModalService or by embedding a custom component that implements IModal.">

  <docs-example
    heading="Open a modal"
    description="Inject ModalService and call openModal() with a registered name and ModalData. The observable resolves once the dialog is closed."
    [code]="basicExample">
    <button rlb-button (click)="modal()">Open Modal</button>
  </docs-example>

  <docs-example
    heading="Setup"
    description="Register your modal components in the app providers under ModalRegistryOptions, then place a single &lt;rlb-modal-container&gt; in your root layout."
    [code]="setupExample"
    language="typescript">
  </docs-example>

  <docs-example
    heading="Building a dialog component"
    description="A dialog is an ordinary standalone component. Apply ModalDirective via hostDirectives and implement IModal. Use data-modal-reason attributes on buttons to set the close reason."
    [code]="dialogExample"
    language="typescript">
  </docs-example>

  <docs-example
    heading="Programmatic open"
    description="openModal() returns an Observable&lt;ModalResult&gt;. Await it with lastValueFrom or subscribe — it emits exactly once when the modal closes with { reason, result }."
    [code]="openModalExample"
    language="typescript">
  </docs-example>

  <docs-example
    heading="Display options"
    description="Pass a ModalOptions object as the third argument to control size, backdrop, scrolling, centering, fullscreen breakpoints, animation, keyboard, and focus."
    [code]="optionsExample"
    language="typescript">
  </docs-example>

  <docs-example
    heading="Built-in simple and confirm modals"
    description="Use openSimpleModal() for a single-button info dialog and openConfirmModal() for a two-button confirmation. Both delegate to the built-in rlb-common component."
    [code]="simpleModalExample"
    language="typescript">
  </docs-example>

  <docs-api
    heading="rlb-modal-container"
    selector="rlb-modal-container"
    [rows]="containerApi" />

  <docs-api
    heading="ModalService"
    [rows]="serviceApi" />

  <docs-api
    heading="ModalDirective ([rlb-modal])"
    selector="[rlb-modal]"
    [rows]="directiveApi" />

  <docs-api
    heading="ModalData&lt;T&gt;"

  <docs-api
    heading="ModalOptions"

</docs-page>
