<docs-page
  title="Placeholders"
  lead="Use placeholder components to indicate loading state for content that has not yet loaded, such as text blocks and custom layouts.">

  <docs-example
    heading="Basic usage"
    description="Use rlb-placeholder-text for a simple single-line placeholder. By default it renders one secondary-colored line at full width."
    [code]="basicExample">
    <rlb-placeholder-text/>
  </docs-example>

  <docs-example
    heading="Colors"
    description="Use the color input to apply any Bootstrap contextual background color to the placeholder lines."
    [code]="colorExample">
    <h6>primary</h6>
    <rlb-placeholder-text color="primary"/>
    <h6>secondary</h6>
    <rlb-placeholder-text color="secondary"/>
    <h6>success</h6>
    <rlb-placeholder-text color="success"/>
    <h6>danger</h6>
    <rlb-placeholder-text color="danger"/>
    <h6>info</h6>
    <rlb-placeholder-text color="info"/>
    <h6>warning</h6>
    <rlb-placeholder-text color="warning"/>
    <h6>light</h6>
    <rlb-placeholder-text color="light"/>
    <h6>dark</h6>
    <rlb-placeholder-text color="dark"/>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Control the height of placeholder lines with the size input: xs, sm, md (default), or lg."
    [code]="sizeExample">
    <h6>xs</h6>
    <rlb-placeholder-text size="xs"/>
    <h6>sm</h6>
    <rlb-placeholder-text size="sm"/>
    <h6>md</h6>
    <rlb-placeholder-text size="md"/>
    <h6>lg</h6>
    <rlb-placeholder-text size="lg"/>
  </docs-example>

  <docs-example
    heading="Width"
    description="Control the width of placeholder lines with the width input. Pass a single CSS value to apply to all lines."
    [code]="widthExample">
    <h6>60%</h6>
    <rlb-placeholder-text width="60%"/>
    <h6>30%</h6>
    <rlb-placeholder-text width="30%"/>
    <h6>100%</h6>
    <rlb-placeholder-text width="100%"/>
  </docs-example>

  <docs-example
    heading="Animation"
    description="Add a glow or wave animation to indicate that content is actively loading."
    [code]="animationExample">
    <h6>glow</h6>
    <rlb-placeholder-text size="lg" animation="glow"/>
    <h6>wave</h6>
    <rlb-placeholder-text size="lg" animation="wave"/>
  </docs-example>

  <docs-example
    heading="Advanced layout"
    description="Use rlb-placeholder as a container with individual rlb-placeholder-line children for full control over each line's width, color, size, and rounding."
    [code]="advancedExample">
    <rlb-placeholder animation="glow">
      <rlb-placeholder-line width="100%"/>
      <rlb-placeholder-line width="80%" color="primary" size="sm"/>
      <rlb-placeholder-line width="60%" [rounded]="false"/>
    </rlb-placeholder>
  </docs-example>

  <docs-api selector="rlb-placeholder-text" [rows]="apiPlaceholderText" />
  <docs-api selector="rlb-placeholder" [rows]="apiPlaceholder" />
  <docs-api selector="rlb-placeholder-line" [rows]="apiPlaceholderLine" />
</docs-page>
