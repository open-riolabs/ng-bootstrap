<docs-page
  title="Calendar"
  lead="A powerful and flexible calendar component for displaying and managing events in Month, Week, or Day views, with timezone-aware rendering, drag-and-drop, and built-in CRUD modals.">

  <docs-example
    heading="Live example"
    description="Interact with the calendar below. Switch views and navigate dates with the toolbar. Click 'Generate events' to populate dummy events across the current week."
    [code]="calendarExample">
    <div class="d-flex flex-column gap-3">
      <div>
        <button rlb-button color="primary" size="sm" (click)="onGenerateTestEvents()">
          Generate events
        </button>
      </div>
      <rlb-calendar
        [view]="view"
        [(events)]="events"
        [intervals]="intervals"
        [current-date]="currentDate"
        [timezone]="timezone"
        [loading]="loading()"
        (date-change)="onDateChange($event)"
        (view-change)="onViewChange($event)"
        (event-click)="onEventClick($event)">
      </rlb-calendar>
    </div>
  </docs-example>

  <docs-example
    heading="TypeScript setup"
    description="Typical component class wiring: declare a view, timezone, currentDate and events array, define background intervals in seconds from midnight, and handle the output events."
    [code]="calendarTSSnippet"
    language="typescript">
  </docs-example>

  <docs-api selector="rlb-calendar" [rows]="api" />
</docs-page>
