<docs-page
  title="Avatar"
  lead="Display a user profile image with configurable size, shape and custom CSS classes using the rlb-avatar component.">

  <docs-example
    heading="Basic usage"
    description="Provide a src URL to render a circular avatar at the default size of 50 px."
    [code]="basicExample">
    <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" />
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size input to control the width and height in pixels. The default is 50."
    [code]="sizeExample">
    <div class="d-flex gap-3 align-items-center">
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" [size]="30" />
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" />
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" [size]="80" />
    </div>
  </docs-example>

  <docs-example
    heading="Shapes"
    description="Choose between circle (fully round, default), round (slight corner radius) and square (no rounding)."
    [code]="shapeExample">
    <div class="d-flex gap-3 align-items-center">
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" shape="circle" />
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" shape="round" />
      <rlb-avatar src="https://www.w3schools.com/howto/img_avatar.png" shape="square" />
    </div>
  </docs-example>

  <docs-api selector="rlb-avatar" [rows]="api" />
</docs-page>
