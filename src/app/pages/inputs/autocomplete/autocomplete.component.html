<docs-page
  title="Autocomplete"
  lead="A text input paired with a dynamic suggestion dropdown. The autocomplete function can return a plain array, a Promise, or an Observable, making it easy to integrate with both local data and remote APIs.">

  <!-- ── Static source ──────────────────────────────────────────────────── -->
  <docs-example
    heading="Static source"
    description="Pass a synchronous function that filters a local array. Results appear after the minimum chars-to-search threshold (default 3) is reached."
    [code]="staticExample">
    <rlb-autocomplete
      [placeholder]="'Search city...'"
      [autocomplete]="searchCities"
      (selected)="onCitySelect($event)">
    </rlb-autocomplete>
  </docs-example>

  <!-- ── Promise source ─────────────────────────────────────────────────── -->
  <docs-example
    heading="Promise source"
    description="The autocomplete function may return a Promise. A loading indicator is displayed inside the dropdown while the promise is pending."
    [code]="promiseExample">
    <rlb-autocomplete
      [placeholder]="'Search product...'"
      [autocomplete]="searchProducts"
      (selected)="onProductSelect($event)">
    </rlb-autocomplete>
  </docs-example>

  <!-- ── Observable source ──────────────────────────────────────────────── -->
  <docs-example
    heading="Observable source"
    description="An Observable return value is also supported. Here chars-to-search is lowered to 2 so the search fires sooner."
    [code]="observableExample">
    <rlb-autocomplete
      [placeholder]="'Search user...'"
      [autocomplete]="searchUsers"
      [chars-to-search]="2"
      (selected)="onUserSelect($event)">
    </rlb-autocomplete>
  </docs-example>

  <!-- ── Reactive Forms ─────────────────────────────────────────────────── -->
  <docs-example
    heading="Reactive Forms"
    description="rlb-autocomplete implements ControlValueAccessor and works with both formControlName and ngModel. The control value is an AutocompleteItem object (or a plain string if strings are returned)."
    [code]="reactiveExample">
    <form [formGroup]="form">
      <rlb-autocomplete
        formControlName="country"
        [placeholder]="'Search country...'"
        [autocomplete]="searchCountries">
      </rlb-autocomplete>
    </form>
    <p class="mt-2 mb-0 small text-body-secondary">Form value: {{ form.value | json }}</p>
  </docs-example>

  <!-- ── Initial suggestions ────────────────────────────────────────────── -->
  <docs-example
    heading="Initial suggestions"
    description="Use initial-suggestions to pre-load items shown on focus when the field is empty. Once the user starts typing, the autocomplete function takes over."
    [code]="initialSuggestionsExample">
    <rlb-autocomplete
      [placeholder]="'Focus to see suggestions...'"
      [initial-suggestions]="recentCities"
      [autocomplete]="searchCities"
      (selected)="onCitySelect($event)">
    </rlb-autocomplete>
  </docs-example>

  <!-- ── Disabled items ─────────────────────────────────────────────────── -->
  <docs-example
    heading="Disabled items"
    description="Set disabled: true on individual AutocompleteItem objects to make them visible in the list but impossible to select. They are rendered with Bootstrap's disabled style and cursor: not-allowed."
    [code]="disabledItemsExample">
    <rlb-autocomplete
      [placeholder]="'Focus to see items...'"
      [initial-suggestions]="productsWithDisabled"
      [autocomplete]="searchDisabledItems"
      (selected)="onProductSelect($event)">
    </rlb-autocomplete>
  </docs-example>

  <!-- ── Advanced form ──────────────────────────────────────────────────── -->
  <docs-example
    heading="Advanced form — validation, patching and specialised components"
    description="A complete form using rlb-autocomplete with async validation, rlb-autocomplete-country with flag icons and locale detection, rlb-autocomplete-country-dial-code for international phone prefixes, and rlb-autocomplete-timezones for IANA timezone selection. Use Patch Mock Data to simulate an API response that patches complex object values."
    [code]="advancedExample">

    <form [formGroup]="advForm" (ngSubmit)="submitForm()" class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Country (generic autocomplete with custom callback)</label>
        <rlb-autocomplete
          open-on-focus
          formControlName="country"
          [autocomplete]="searchCountries"
          placeholder="Search country..."
          enable-validation="true">
        </rlb-autocomplete>
      </div>

      <div class="col-md-6">
        <label class="form-label">
          Assign to User
          @if (advForm.get('user')?.pending) {
            <span class="spinner-border spinner-border-sm text-primary ms-2"></span>
          }
        </label>
        <rlb-autocomplete
          formControlName="user"
          [autocomplete]="searchUsers"
          [chars-to-search]="1"
          placeholder="Type 'Alice'..."
          enable-validation="true">
        </rlb-autocomplete>
        <div class="form-text">Validation: &apos;Charlie&apos; is restricted.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Birth Country (specialised component)</label>
        <rlb-autocomplete-country
          open-on-focus
          enable-flag-icons
          detect-locale
          formControlName="birthCountry"
          placeholder="Type to search countries..."
          enable-validation="true">
        </rlb-autocomplete-country>
      </div>

      <div class="col-md-6">
        <label class="form-label">Phone Prefix</label>
        <rlb-autocomplete-country-dial-code
          formControlName="dialCode"
          open-on-focus
          placeholder="Search code or country..."
          [loading]="isSaving"
          enable-validation="true">
        </rlb-autocomplete-country-dial-code>
      </div>

      <div class="col-md-12">
        <label class="form-label">Preferred Timezone</label>
        <rlb-autocomplete-timezones
          formControlName="timezone"
          open-on-focus
          placeholder="Search timezone (e.g. Rome)..."
          enable-validation="true">
        </rlb-autocomplete-timezones>
      </div>

      <div class="col-12 mt-4 d-flex gap-2">
        <button type="button" class="btn btn-outline-secondary" (click)="patchMockData()">
          Patch Mock Data
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || advForm.pending">
          @if (isSaving) {
            <span class="spinner-border spinner-border-sm me-2"></span> Saving...
          } @else {
            Submit Form
          }
        </button>
      </div>
    </form>

    <div class="mt-4 p-3 bg-body-tertiary border rounded">
      <h6 class="text-secondary border-bottom pb-2">Form state</h6>
      <div class="row small">
        <div class="col-md-7">
          <strong>Value:</strong>
          <pre class="text-info-emphasis mb-0"><code>{{ advForm.value | json }}</code></pre>
        </div>
        <div class="col-md-5 border-start">
          <strong>Status:</strong><br>
          Valid: <span rlb-badge [color]="advForm.valid ? 'success' : 'danger'">{{ advForm.valid }}</span><br>
          Touched: <span rlb-badge [color]="advForm.touched ? 'warning' : 'secondary'">{{ advForm.touched }}</span><br>
          Pending: <span rlb-badge [color]="advForm.pending ? 'info' : 'secondary'">{{ advForm.pending }}</span>
        </div>
      </div>
    </div>

  </docs-example>

  <!-- ── API: rlb-autocomplete ──────────────────────────────────────────── -->
  <docs-api selector="rlb-autocomplete" [rows]="autocompleteApi" />

  <!-- ── API: rlb-autocomplete-country ─────────────────────────────────── -->
  <docs-api selector="rlb-autocomplete-country" [rows]="autocompleteCountryApi" />

  <!-- ── API: rlb-autocomplete-country-dial-code ───────────────────────── -->
  <docs-api selector="rlb-autocomplete-country-dial-code" [rows]="autocompleteDialCodeApi" />

  <!-- ── API: rlb-autocomplete-timezones ───────────────────────────────── -->
  <docs-api selector="rlb-autocomplete-timezones" [rows]="autocompleteTimezonesApi" />

</docs-page>
