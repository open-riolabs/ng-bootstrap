<docs-page
  title="Input"
  lead="A universal, form-friendly text input component that supports all standard HTML input types, reactive and template-driven forms, validation display, and timezone-aware datetime handling.">

  <docs-example
    heading="Basic usage"
    description="Bind rlb-input with ngModel for template-driven forms, or with formControlName inside a FormGroup for reactive forms."
    [code]="basicExample">
    <rlb-input [(ngModel)]="input" placeholder="Type something..."></rlb-input>
  </docs-example>

  <docs-example
    heading="Input types"
    description="Pass the type attribute to select any standard HTML input type. For number inputs use [min] and [max] to constrain the value; for datetime-local use date-type to control the output format."
    [code]="typesExample">
    <div class="d-flex flex-column gap-3">
      <rlb-input type="text" placeholder="Text input"></rlb-input>
      <rlb-input type="email" placeholder="Email input"></rlb-input>
      <rlb-input type="password" placeholder="Password input"></rlb-input>
      <rlb-input type="number" placeholder="Number input" [min]="0" [max]="100"></rlb-input>
      <rlb-input type="datetime-local"></rlb-input>
    </div>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size attribute with &quot;small&quot; or &quot;large&quot;; omit it for the default Bootstrap input size."
    [code]="sizesExample">
    <div class="d-flex flex-column gap-3">
      <rlb-input size="small" placeholder="Small input"></rlb-input>
      <rlb-input placeholder="Default input"></rlb-input>
      <rlb-input size="large" placeholder="Large input"></rlb-input>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled and readonly"
    description="Set [disabled]=&quot;true&quot; to block all interaction, or [readonly]=&quot;true&quot; to allow reading but not editing."
    [code]="disabledReadonlyExample">
    <div class="d-flex flex-column gap-3">
      <rlb-input [disabled]="true" placeholder="Disabled input"></rlb-input>
      <rlb-input [readonly]="true" placeholder="Readonly input"></rlb-input>
    </div>
  </docs-example>

  <docs-example
    heading="Advanced form — validation, async validators &amp; patching"
    description="A complete reactive form showing sync and async validation, enable-validation feedback classes, datetime-local with date-type=&quot;string&quot;, and form-level patch/submit actions."
    [code]="advancedFormExample">
    <form [formGroup]="form" (ngSubmit)="submitForm()" class="row g-3">

      <div class="col-md-6">
        <rlb-input inputId="demo-basic-text" formControlName="basicText" enable-validation="true">
          <label for="demo-basic-text" class="form-label d-block w-100 mb-2" before>Basic Text (Required)</label>
        </rlb-input>
      </div>

      <div class="col-md-6">
        <label for="demo-number-input" class="form-label">Number (Min 10, Max 100)</label>
        <rlb-input inputId="demo-number-input" type="number" formControlName="numberInput"
          [min]="10" [max]="100" enable-validation="true"></rlb-input>
      </div>

      <div class="col-md-6">
        <label for="demo-date-input" class="form-label">Datetime Local (String Output)</label>
        <rlb-input enable-validation="true" inputId="demo-date-input"
          type="datetime-local" date-type="string" formControlName="dateInput"></rlb-input>
      </div>

      <div class="col-md-6">
        <label for="demo-email-input" class="form-label">
          Async Email Validation
          @if (form.get('asyncEmail')?.pending) {
            <span class="spinner-border spinner-border-sm text-primary ms-2" role="status"></span>
          }
        </label>
        <rlb-input inputId="demo-email-input" type="email"
          formControlName="asyncEmail" enable-validation="true"></rlb-input>
        <div class="form-text">Type <code>taken&#64;test.com</code> to trigger async error (1s delay).</div>
      </div>

      <div class="col-12 mt-4 d-flex gap-2">
        <button rlb-button outline color="secondary" type="button" (click)="patchData()">
          Patch Mock Data
        </button>
        <button rlb-button color="primary" type="submit" [disabled]="isSaving || form.pending">
          @if (isSaving) {
            <rlb-spinner class="spinner-border spinner-border-sm me-2" role="status"></rlb-spinner>
            Saving...
          } @else {
            Submit
          }
        </button>
      </div>
    </form>

    <div class="mt-4 p-3 bg-body-tertiary border rounded">
      <h5 class="h6">Form State Tracker</h5>
      <div class="row">
        <div class="col-md-6">
          <strong>Value:</strong>
          <pre class="mt-1"><code>{{ form.value | json }}</code></pre>
        </div>
        <div class="col-md-6">
          <strong>Status:</strong>
          <p class="mt-1">
            Valid: <span rlb-badge [color]="form.valid ? 'success' : 'danger'">{{ form.valid }}</span><br>
            Touched: <span rlb-badge [color]="form.touched ? 'warning' : 'secondary'">{{ form.touched }}</span><br>
            Pending: <span rlb-badge [color]="form.pending ? 'info' : 'secondary'">{{ form.pending }}</span>
          </p>
        </div>
      </div>
    </div>
  </docs-example>

  <docs-api selector="rlb-input" [rows]="api" />
</docs-page>
