<docs-page
  title="Color"
  lead="The rlb-color component wraps the native color picker input as a ControlValueAccessor, integrating seamlessly with Angular Reactive and Template-driven forms.">

  <docs-example
    heading="Basic usage"
    description="Drop rlb-color onto the page without any binding for a standalone color picker defaulting to black."
    [code]="basicExample">
    <rlb-color></rlb-color>
  </docs-example>

  <docs-example
    heading="Reactive forms"
    description="Bind with formControlName inside a FormGroup. The current hex value is reflected in the form model."
    [code]="reactiveExample">
    <form [formGroup]="form">
      <rlb-color formControlName="favoriteColor"></rlb-color>
    </form>
    <p class="mt-2 mb-0 text-body-secondary small">Value: {{ form.value | json }}</p>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size input to render a small, default, or large color picker."
    [code]="sizeExample">
    <div class="d-flex gap-3 align-items-center flex-wrap">
      <rlb-color size="small"></rlb-color>
      <rlb-color></rlb-color>
      <rlb-color size="large"></rlb-color>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Set [disabled]=&quot;true&quot; to prevent user interaction with the color picker."
    [code]="disabledExample">
    <rlb-color [disabled]="true"></rlb-color>
  </docs-example>

  <docs-example
    heading="Read-only state"
    description="Set [readonly]=&quot;true&quot; to display the color without allowing changes."
    [code]="readonlyExample">
    <rlb-color [readonly]="true"></rlb-color>
  </docs-example>

  <docs-example
    heading="Custom id"
    description="Supply a custom id attribute to link the input to an external label or for targeting in tests."
    [code]="customIdExample">
    <label for="my-color-picker" class="form-label">Favourite color</label>
    <rlb-color id="my-color-picker"></rlb-color>
  </docs-example>

  <docs-api selector="rlb-color" [rows]="api" />
</docs-page>
