<docs-page
  title="File"
  lead="Use rlb-file to let users pick one or more files. It implements ControlValueAccessor and integrates directly with Reactive and Template-driven forms.">

  <docs-example
    heading="Basic"
    description="The simplest usage — a standalone file picker with no configuration."
    [code]="basicExample">
    <rlb-file></rlb-file>
  </docs-example>

  <docs-example
    heading="Multiple files"
    description="Set [multiple]=&quot;true&quot; to allow the user to select more than one file. The form-control value becomes an array of File objects."
    [code]="multipleExample">
    <rlb-file [multiple]="true"></rlb-file>
  </docs-example>

  <docs-example
    heading="Accept filter"
    description="Use the accept attribute to restrict the file picker to specific types, using MIME types or file extensions."
    [code]="acceptExample">
    <rlb-file accept="image/*"></rlb-file>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Control the visual size of the input with size=&quot;small&quot; or size=&quot;large&quot;. The default renders the standard Bootstrap form-control size."
    [code]="sizesExample">
    <div class="d-flex flex-column gap-3">
      <rlb-file size="small"></rlb-file>
      <rlb-file></rlb-file>
      <rlb-file size="large"></rlb-file>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Pass [disabled]=&quot;true&quot; to prevent interaction. The disabled state is also propagated automatically by Angular forms when the parent FormControl is disabled."
    [code]="disabledExample">
    <rlb-file [disabled]="true"></rlb-file>
  </docs-example>

  <docs-example
    heading="Reactive forms"
    description="Use formControlName to bind rlb-file to a FormControl. The value is a File object (or File[] when multiple is true). Validation errors are shown automatically when the control is touched and invalid."
    [code]="reactiveExample">
    <form [formGroup]="form" class="d-flex flex-column gap-3">
      <rlb-file formControlName="attachment"></rlb-file>
      @if (selectedFile) {
        <p class="mb-0 text-body-secondary">
          Selected: <strong>{{ selectedFile.name }}</strong>
          ({{ (selectedFile.size / 1024).toFixed(1) }} KB)
        </p>
      }
      <div>
        <button rlb-button color="primary" type="submit" [disabled]="form.invalid">Submit</button>
      </div>
    </form>
  </docs-example>

  <docs-api selector="rlb-file" [rows]="api" />
</docs-page>
