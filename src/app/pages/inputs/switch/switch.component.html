<docs-page
  title="Switch"
  lead="A toggle switch gives users a binary on/off control. It implements ControlValueAccessor so it works with both Reactive and Template-driven forms.">

  <docs-example
    heading="Basic usage"
    description="Drop in rlb-switch and project a label into the [after] content slot."
    [code]="basicExample">
    <rlb-switch>
      <label class="form-check-label" after>Enable notifications</label>
    </rlb-switch>
  </docs-example>

  <docs-example
    heading="Label position"
    description="Use the [before] slot to place a label to the left of the toggle, or [after] to place it to the right."
    [code]="labelPositionExample">
    <div class="d-flex flex-column gap-3">
      <rlb-switch>
        <label class="form-check-label" before>Dark mode</label>
      </rlb-switch>
      <rlb-switch>
        <label class="form-check-label" after>Dark mode</label>
      </rlb-switch>
    </div>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size input to render a smaller or larger toggle. The default size requires no size attribute."
    [code]="sizesExample">
    <div class="d-flex flex-column gap-3">
      <rlb-switch size="small">
        <label class="form-check-label" after>Small switch</label>
      </rlb-switch>
      <rlb-switch>
        <label class="form-check-label" after>Default switch</label>
      </rlb-switch>
      <rlb-switch size="large">
        <label class="form-check-label" after>Large switch</label>
      </rlb-switch>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Set [disabled]=&quot;true&quot; to prevent the user from toggling the switch. The switch renders visually muted."
    [code]="disabledExample">
    <div class="d-flex flex-column gap-3">
      <rlb-switch [disabled]="true">
        <label class="form-check-label" after>Disabled (off)</label>
      </rlb-switch>
    </div>
  </docs-example>

  <docs-example
    heading="Read-only state"
    description="Set [readonly]=&quot;true&quot; to display the current value without allowing changes."
    [code]="readonlyExample">
    <rlb-switch [readonly]="true">
      <label class="form-check-label" after>Read-only</label>
    </rlb-switch>
  </docs-example>

  <docs-example
    heading="Reactive forms"
    description="Bind with formControlName inside a FormGroup. Validation state (invalid, touched) automatically applies the Bootstrap is-invalid class."
    [code]="reactiveExample">
    <form [formGroup]="form" class="d-flex flex-column gap-3">
      <rlb-switch formControlName="notifications">
        <label class="form-check-label" after>Email notifications</label>
      </rlb-switch>

      <div>
        <rlb-switch formControlName="terms">
          <label class="form-check-label" after>I accept the terms and conditions</label>
        </rlb-switch>
        @if (termsControl?.touched && termsControl?.invalid) {
          <div class="text-danger small mt-1">You must accept the terms to continue.</div>
        }
      </div>

      <div class="d-flex gap-2">
        <button rlb-button color="primary" type="button" (click)="form.markAllAsTouched()">Validate</button>
        <button rlb-button color="secondary" type="button" (click)="form.reset()">Reset</button>
      </div>
    </form>
  </docs-example>

  <docs-api selector="rlb-switch" [rows]="api" />
</docs-page>
