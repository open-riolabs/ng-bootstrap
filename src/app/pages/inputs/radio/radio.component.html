<docs-page
  title="Radio"
  lead="Use rlb-radio with rlb-option children to let users pick exactly one value from a group. Works with both ngModel and reactive forms via ControlValueAccessor.">

  <docs-example
    heading="Basic usage"
    description="Bind the selected value with ngModel. Each rlb-option receives a value; the label is projected as content."
    [code]="basicExample">
    <rlb-radio [(ngModel)]="value">
      <rlb-option value="1">Option 1</rlb-option>
      <rlb-option value="2">Option 2</rlb-option>
      <rlb-option value="3">Option 3</rlb-option>
    </rlb-radio>
    <p class="mt-2 mb-0 text-body-secondary">Selected: <strong>{{ value }}</strong></p>
  </docs-example>

  <docs-example
    heading="Disabled group"
    description="Add [disabled]=&quot;true&quot; to the rlb-radio element to disable every radio button in the group."
    [code]="disabledExample">
    <rlb-radio [(ngModel)]="value" [disabled]="true">
      <rlb-option value="1">Option 1</rlb-option>
      <rlb-option value="2">Option 2</rlb-option>
      <rlb-option value="3">Option 3</rlb-option>
    </rlb-radio>
  </docs-example>

  <docs-example
    heading="Read-only group"
    description="Add [readonly]=&quot;true&quot; to show the current selection without allowing changes."
    [code]="readonlyExample">
    <rlb-radio [(ngModel)]="value" [readonly]="true">
      <rlb-option value="1">Option 1</rlb-option>
      <rlb-option value="2">Option 2</rlb-option>
      <rlb-option value="3">Option 3</rlb-option>
    </rlb-radio>
  </docs-example>

  <docs-example
    heading="Disabled individual option"
    description="Set [disabled]=&quot;true&quot; on a single rlb-option to prevent only that choice from being selected."
    [code]="disabledOptionExample">
    <rlb-radio [(ngModel)]="value">
      <rlb-option value="1">Option 1</rlb-option>
      <rlb-option value="2" [disabled]="true">Option 2 (disabled)</rlb-option>
      <rlb-option value="3">Option 3</rlb-option>
    </rlb-radio>
  </docs-example>

  <docs-api selector="rlb-radio" [rows]="radioApi" />
  <docs-api heading="rlb-option API" selector="rlb-option" [rows]="optionApi" />

</docs-page>
