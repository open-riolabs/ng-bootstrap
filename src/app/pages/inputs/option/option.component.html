<docs-page
  title="Option"
  lead="rlb-option is the child element used inside rlb-select (and rlb-radio) to declare individual choices. Each option carries a value and an optional disabled state.">

  <docs-example
    heading="Basic usage"
    description="Place one or more rlb-option elements inside rlb-select. The text content becomes the visible label."
    [code]="basicExample">
    <rlb-select placeholder="Select an option">
      <rlb-option value="angular">Angular</rlb-option>
      <rlb-option value="react">React</rlb-option>
      <rlb-option value="vue">Vue</rlb-option>
    </rlb-select>
  </docs-example>

  <docs-example
    heading="Disabled options"
    description="Add the disabled attribute to any rlb-option to prevent it from being selected."
    [code]="disabledExample">
    <rlb-select placeholder="Select an option">
      <rlb-option value="angular">Angular</rlb-option>
      <rlb-option value="react" disabled>React (disabled)</rlb-option>
      <rlb-option value="vue">Vue</rlb-option>
    </rlb-select>
  </docs-example>

  <docs-example
    heading="Dynamic options"
    description="Render options with @for, binding value and disabled from your component data."
    [code]="dynamicExample">
    <rlb-select placeholder="Select a technology">
      @for (item of items; track item.value) {
        <rlb-option [value]="item.value" [disabled]="item.disabled">
          {{ item.label }}
        </rlb-option>
      }
    </rlb-select>
  </docs-example>

  <docs-api selector="rlb-option" [rows]="api" />
</docs-page>
