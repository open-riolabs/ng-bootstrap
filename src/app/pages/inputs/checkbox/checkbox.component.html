<docs-page
  title="Checkbox"
  lead="Use rlb-checkbox to let users select one or more options from a set. The component implements ControlValueAccessor and integrates with both reactive and template-driven Angular forms.">

  <docs-example
    heading="Basic usage"
    description="Bind a FormControl of type boolean directly to the component."
    [code]="basicExample">
    <rlb-checkbox [formControl]="basicControl"></rlb-checkbox>
  </docs-example>

  <docs-example
    heading="With a label"
    description="Project a label into the after slot to place it to the right of the checkbox."
    [code]="labelExample">
    <rlb-checkbox [formControl]="basicControl">
      <label class="form-check-label" after>Accept terms and conditions</label>
    </rlb-checkbox>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Set [disabled]=&quot;true&quot; to prevent interaction. The disabled state is also respected when set via the Angular CVA API (e.g. control.disable())."
    [code]="disabledExample">
    <rlb-checkbox [disabled]="true" [formControl]="basicControl">
      <label class="form-check-label" after>Disabled checkbox</label>
    </rlb-checkbox>
  </docs-example>

  <docs-example
    heading="Read-only state"
    description="Set [readonly]=&quot;true&quot; to render the checkbox as interactive-looking but non-mutable."
    [code]="readonlyExample">
    <rlb-checkbox [readonly]="true" [formControl]="basicControl">
      <label class="form-check-label" after>Read-only checkbox</label>
    </rlb-checkbox>
  </docs-example>

  <docs-example
    heading="Indeterminate state"
    description="Set [indeterminate]=&quot;true&quot; and bind a control whose value is undefined or null to display the native browser indeterminate state."
    [code]="indeterminateExample">
    <rlb-checkbox [indeterminate]="true" [formControl]="indeterminateControl">
      <label class="form-check-label" after>Indeterminate checkbox (value is undefined)</label>
    </rlb-checkbox>
  </docs-example>

  <docs-example
    heading="Validation"
    description="Add enable-validation to apply Bootstrap is-valid / is-invalid feedback classes once the control has been touched or dirtied."
    [code]="validationExample">
    <form [formGroup]="requiredForm">
      <rlb-checkbox formControlName="accepted" enable-validation>
        <label class="form-check-label" after>I agree to the terms</label>
      </rlb-checkbox>
    </form>
    <p class="mt-2 text-body-secondary small">
      Control status: <code>{{ requiredControl.status }}</code> &mdash;
      Touched: <code>{{ requiredControl.touched }}</code>
    </p>
  </docs-example>

  <docs-api selector="rlb-checkbox" [rows]="api" />
</docs-page>
