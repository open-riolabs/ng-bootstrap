<docs-page
  title="Input Group"
  lead="Wrap one or more rlb-input components in rlb-input-group to visually group fields, display text addons, and collect validation errors in a single place.">

  <docs-example
    heading="Grouped validation"
    description="Add the validate attribute to aggregate errors from every child rlb-input and surface them through a single rlb-input-validation element. Submit the form empty to see the errors."
    [code]="basicExample">
    <rlb-input-group validate>
      <rlb-input name="email" [formControl]="emailControl" placeholder="Email"></rlb-input>
      <rlb-input name="phone" [formControl]="phoneControl" placeholder="Phone"></rlb-input>
      <rlb-input-validation></rlb-input-validation>
    </rlb-input-group>
  </docs-example>

  <docs-example
    heading="Text mode"
    description="Add the text attribute to turn the group into an input-group-text container, useful for displaying static labels, icons, or symbols alongside other inputs."
    [code]="textModeExample">
    <div class="d-flex flex-column gap-2">
      <rlb-input-group text>
        <span>&#64;</span>
      </rlb-input-group>
      <rlb-input-group text>
        <span>https://</span>
      </rlb-input-group>
    </div>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use size=&quot;small&quot; or size=&quot;large&quot; to apply Bootstrap&apos;s input-group-sm and input-group-lg classes to the entire group."
    [code]="sizeExample">
    <div class="d-flex flex-column gap-2">
      <rlb-input-group size="small">
        <rlb-input placeholder="Small group"></rlb-input>
      </rlb-input-group>
      <rlb-input-group>
        <rlb-input placeholder="Default group"></rlb-input>
      </rlb-input-group>
      <rlb-input-group size="large">
        <rlb-input placeholder="Large group"></rlb-input>
      </rlb-input-group>
    </div>
  </docs-example>

  <docs-api selector="rlb-input-group" [rows]="api" />
</docs-page>
