<docs-page
  title="Datalist"
  lead="Use rlb-datalist to give users a free-text input enriched with browser-native autocomplete suggestions. Unlike a select, the user is never restricted to the proposed list.">

  <docs-example
    heading="Basic usage"
    description="Drop option elements as children of rlb-datalist. The browser renders a suggestion dropdown while still allowing any typed value."
    [code]="basicExample">
    <rlb-datalist placeholder="Type or pick a fruit...">
      <option>Apple</option>
      <option>Banana</option>
      <option>Cherry</option>
      <option>Date</option>
      <option>Elderberry</option>
    </rlb-datalist>
  </docs-example>

  <docs-example
    heading="Reactive forms"
    description="Wire rlb-datalist into a reactive form with formControlName. The component implements ControlValueAccessor, so validation and patching work out of the box."
    [code]="reactiveExample">
    <form [formGroup]="form" class="row g-3">
      <div class="col-md-6">
        <rlb-datalist formControlName="fruit" placeholder="Type or pick a fruit...">
          <option>Apple</option>
          <option>Banana</option>
          <option>Cherry</option>
          <option>Date</option>
          <option>Elderberry</option>
        </rlb-datalist>
      </div>
      <div class="col-md-6">
        <div class="p-3 bg-body-secondary border rounded">
          <strong>Form value:</strong>
          <pre class="mb-0 mt-1"><code>{{ formValue }}</code></pre>
        </div>
      </div>
    </form>
  </docs-example>

  <docs-example
    heading="Sizes"
    description="Use the size input with &quot;small&quot; or &quot;large&quot; to apply Bootstrap's form-control-sm / form-control-lg classes. Omit size for the default height."
    [code]="sizesExample">
    <div class="d-flex flex-column gap-3" style="max-width: 400px">
      <rlb-datalist size="small" placeholder="Small datalist">
        <option>Suggestion 1</option>
        <option>Suggestion 2</option>
      </rlb-datalist>

      <rlb-datalist placeholder="Default datalist">
        <option>Suggestion 1</option>
        <option>Suggestion 2</option>
      </rlb-datalist>

      <rlb-datalist size="large" placeholder="Large datalist">
        <option>Suggestion 1</option>
        <option>Suggestion 2</option>
      </rlb-datalist>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled and read-only"
    description="Set [disabled]=&quot;true&quot; to block all interaction, or [readonly]=&quot;true&quot; to allow focus and copy but prevent editing."
    [code]="disabledExample">
    <div class="d-flex flex-column gap-3" style="max-width: 400px">
      <rlb-datalist [disabled]="true" placeholder="Disabled">
        <option>Suggestion 1</option>
      </rlb-datalist>

      <rlb-datalist [readonly]="true" placeholder="Read-only">
        <option>Suggestion 1</option>
      </rlb-datalist>
    </div>
  </docs-example>

  <docs-example
    heading="Content slots (before / after)"
    description="Project elements with the before or after attribute to add input-group addons on either side of the datalist."
    [code]="slotsExample">
    <div style="max-width: 400px">
      <rlb-datalist placeholder="Pick a city...">
        <span before class="input-group-text"><i class="bi bi-geo-alt"></i></span>
        <option>London</option>
        <option>New York</option>
        <option>Paris</option>
        <option>Tokyo</option>
        <span after class="input-group-text">&#x1F30D;</span>
      </rlb-datalist>
    </div>
  </docs-example>

  <docs-api selector="rlb-datalist" [rows]="api" />
</docs-page>
