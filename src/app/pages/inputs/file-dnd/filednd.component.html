<docs-page
  title="File Drag &amp; Drop"
  lead="Use rlb-file-dnd to let users select or drag files into an upload zone. Supports single or multiple files and emits the current file list on every change.">

  <docs-example
    heading="Basic usage"
    description="Drop a file onto the zone or click the Browse Files button to open the native file picker. The (files) output emits the updated array after every add or remove."
    [code]="basicExample">
    <rlb-file-dnd (files)="selectedFiles.set($event)"></rlb-file-dnd>
  </docs-example>

  <docs-example
    heading="Multiple files"
    description="Set [multiple]=&quot;true&quot; to allow more than one file. Every new drop or picker selection appends to the list; each entry has a remove button."
    [code]="multipleExample">
    <rlb-file-dnd [multiple]="true" (files)="selectedFiles.set($event)"></rlb-file-dnd>
  </docs-example>

  <docs-example
    heading="Custom labels"
    description="Pass a data object with content.drag and content.button strings to override the default drop-zone heading and browse button text."
    [code]="customLabelExample">
    <rlb-file-dnd
      [data]="{ content: { drag: 'Drop your images here', button: 'Pick Images' } }"
      (files)="selectedFiles.set($event)">
    </rlb-file-dnd>
  </docs-example>

  <docs-api selector="rlb-file-dnd" [rows]="api" />
</docs-page>
