<docs-page
  title="Range"
  lead="Use rlb-range to let users select a numeric value within a defined interval. It implements ControlValueAccessor and works with both Reactive and Template-driven forms.">

  <docs-example
    heading="Basic usage"
    description="Bind a FormControl to rlb-range. The slider starts at the value set on the control."
    [code]="basicExample">
    <div class="d-flex flex-column gap-2">
      <rlb-range [formControl]="basicControl"></rlb-range>
      <small class="text-body-secondary">Value: {{ basicControl.value }}</small>
    </div>
  </docs-example>

  <docs-example
    heading="Min and max"
    description="Use the min and max inputs to constrain the selectable range."
    [code]="minMaxExample">
    <div class="d-flex flex-column gap-2">
      <rlb-range [formControl]="minMaxControl" [min]="0" [max]="100"></rlb-range>
      <small class="text-body-secondary">Value: {{ minMaxControl.value }}</small>
    </div>
  </docs-example>

  <docs-example
    heading="Step"
    description="Set step to control the interval between selectable values. The example below snaps to multiples of 10."
    [code]="stepExample">
    <div class="d-flex flex-column gap-2">
      <rlb-range [formControl]="stepControl" [min]="0" [max]="100" [step]="10"></rlb-range>
      <small class="text-body-secondary">Value: {{ stepControl.value }}</small>
    </div>
  </docs-example>

  <docs-example
    heading="Disabled state"
    description="Pass [disabled]=&quot;true&quot; or disable the FormControl to prevent user interaction."
    [code]="disabledExample">
    <rlb-range [formControl]="disabledControl"></rlb-range>
  </docs-example>

  <docs-example
    heading="Read-only"
    description="Use [readonly]=&quot;true&quot; to display the current value without allowing changes."
    [code]="readonlyExample">
    <div class="d-flex flex-column gap-2">
      <rlb-range [formControl]="basicControl" [readonly]="true"></rlb-range>
      <small class="text-body-secondary">Value: {{ basicControl.value }}</small>
    </div>
  </docs-example>

  <docs-example
    heading="Custom id"
    description="Supply an id to control the underlying input element id, useful when associating a label."
    [code]="customIdExample">
    <div class="d-flex flex-column gap-2">
      <label for="my-range" class="form-label">Volume</label>
      <rlb-range id="my-range" [formControl]="basicControl"></rlb-range>
    </div>
  </docs-example>

  <docs-api selector="rlb-range" [rows]="api" />
</docs-page>
